# 世界线品牌配置
organization:
  name: "世界线"
  logo: "/favicon.svg"
  avatar: "/avatar.jpg"
  login_bg: "/login-bg.jpg"

branding:
  name: "Worldline"
  title: "世界线：企业级知识平台"
  subtitle: "面向复杂领域知识接入、检索增强、图谱推理与智能体协同的产品化平台"
  description: "平台层负责统一入口、导航、品牌、权限与运维能力，模块层负责知识结构、问答模板、图谱与推荐逻辑。"

features:
  - label: "平台底座"
    value: "可复用知识能力"
    description: "保留知识库、RAG、图谱、智能体与后台配置等通用能力"
    icon: "stars"
  - label: "首期主题"
    value: "Path of Exile"
    description: "聚焦职业、升华、技能、装备、流派与机制知识"
    icon: "resolved"
  - label: "运行目标"
    value: "本地可运行"
    description: "支持持续开发、演示验证、版本发布与后续企业化扩展"
    icon: "commits"
  - label: "改造原则"
    value: "平台与模块分离"
    description: "共享平台能力，不把 PoE 逻辑硬编码进全局公共模块"
    icon: "license"

themes:
  - id: "poe"
    name: "流放之路"
    subtitle: "Path of Exile"
    description: "世界线首个完整主题模块，围绕职业、升华、技能、装备、流派与机制组织知识入口。"
    status: "Phase 1"
    featured: true
    entry_route: "/themes/poe"
    tags:
      - "Build"
      - "Skill Gem"
      - "Ascendancy"
      - "Mechanic"
    highlights:
      - "PoE 主题首页与模块上下文入口"
      - "PoE 知识分类与 metadata 方案"
      - "已接入推荐候选、图谱闭环与 Agent 上下文演示路径"
    context:
      theme: "poe"
      module: "poe"
      scene: "overview"
      version: "phase2"
    links:
      docs: "http://localhost:5174/02-poe-knowledge-schema"
      roadmap: "http://localhost:5174/03-implementation-roadmap"
    entry_points:
      - name: "主题首页"
        type: "route"
        route: "/themes/poe"
      - name: "智能体入口"
        type: "route"
        route: "/agent"
      - name: "知识方案"
        type: "link"
        url: "http://localhost:5174/02-poe-knowledge-schema"
  - id: "worldline-ops"
    name: "运营验证"
    subtitle: "Worldline Ops"
    description: "用于发布前检查、证据收口、运行恢复和平台协同的第二模块试点，只验证模块接入契约，不扩展后端协议。"
    status: "Phase 6 Pilot"
    featured: false
    entry_route: "/themes/worldline-ops"
    tags:
      - "Release Gate"
      - "Evidence"
      - "Recovery"
      - "Operations"
    highlights:
      - "以最小静态样本验证第二模块如何被平台发现与消费"
      - "覆盖发布前检查、证据包收口和运行恢复三条基础运营世界线"
      - "共享层继续只通过 worldline facade 消费模块能力"
    context:
      theme: "worldline-ops"
      module: "worldline-ops"
      scene: "overview"
      version: "phase6-pilot"
    links:
      docs: "http://localhost:5174/operations-and-validation"
    entry_points:
      - name: "主题首页"
        type: "route"
        route: "/themes/worldline-ops"
      - name: "世界线工作台"
        type: "route"
        route: "/worldline/worldline-ops"
      - name: "智能体入口"
        type: "route"
        route: "/agent"

  - id: "worldline-sandbox"
    name: "Sandbox"
    subtitle: "Worldline Sandbox"
    description: "A lightweight third module used to validate facade-only discovery, workbench, agent, and graph consumption without backend expansion."
    status: "Phase 8 Validation"
    featured: false
    entry_route: "/themes/worldline-sandbox"
    tags:
      - "Sandbox"
      - "Facade"
      - "Validation"
      - "Handoff"
    highlights:
      - "Provides the smallest reusable adapter contract for a third module."
      - "Keeps ThemeDetail, Workbench, Agent, and Graph chains readable without touching shared views."
      - "Stays static and frontend-only so Phase 8 can validate module coexistence without backend work."
    context:
      theme: "worldline-sandbox"
      module: "worldline-sandbox"
      scene: "overview"
      version: "phase8-minimal"
    entry_points:
      - name: "Theme detail"
        type: "route"
        route: "/themes/worldline-sandbox"
      - name: "Workbench"
        type: "route"
        route: "/worldline/worldline-sandbox"
      - name: "Agent"
        type: "route"
        route: "/agent"

actions:
  - name: "文档中心"
    icon: "docs"
    url: "http://localhost:5174/"
  - name: "实施路线"
    icon: "roadmap"
    url: "http://localhost:5174/03-implementation-roadmap"
  - name: "产品演示脚本"
    icon: "video"
    url: "http://localhost:5174/04-demo-script"

footer:
  copyright: "© 世界线 2026"
  user_agreement_url: "/protocols/user-agreement.template.html"
  privacy_policy_url: "/protocols/privacy-policy.template.html"
